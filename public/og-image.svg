<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.3" opacity="0.1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Route Lines -->
  <path d="M 100 300 Q 300 200 500 350 T 900 280" fill="none" stroke="url(#accent)" stroke-width="3" stroke-dasharray="10 5" opacity="0.6"/>
  <path d="M 200 400 Q 400 300 600 450 T 1000 380" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="8 4" opacity="0.4"/>
  
  <!-- Location Pins -->
  <circle cx="300" cy="250" r="20" fill="#ef4444" opacity="0.3"/>
  <circle cx="300" cy="250" r="10" fill="#ef4444" opacity="0.6"/>
  <circle cx="700" cy="200" r="15" fill="#10b981" opacity="0.3"/>
  <circle cx="700" cy="200" r="8" fill="#10b981" opacity="0.6"/>
  <circle cx="500" cy="350" r="18" fill="#3b82f6" opacity="0.3"/>
  <circle cx="500" cy="350" r="9" fill="#3b82f6" opacity="0.6"/>
  
  <!-- House Icon -->
  <g transform="translate(550, 180)">
    <rect x="0" y="20" width="40" height="30" fill="white" opacity="0.2" rx="4"/>
    <polygon points="20,0 0,20 40,20" fill="white" opacity="0.3"/>
    <rect x="15" y="30" width="10" height="20" fill="white" opacity="0.4" rx="2"/>
  </g>
  
  <!-- Delivery Rider Icon -->
  <g transform="translate(650, 300)">
    <circle cx="15" cy="10" r="8" fill="white" opacity="0.3"/>
    <rect x="5" y="18" width="20" height="15" fill="white" opacity="0.2" rx="3"/>
    <circle cx="10" cy="38" r="4" fill="white" opacity="0.3"/>
    <circle cx="25" cy="38" r="4" fill="white" opacity="0.3"/>
  </g>
  
  <!-- Logo -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="50" height="50" fill="url(#accent)" rx="12"/>
    <path d="M 25 12 L 15 25 L 35 25 Z" fill="white" opacity="0.9"/>
    <circle cx="25" cy="20" r="4" fill="white"/>
  </g>
  
  <!-- Brand Name -->
  <text x="170" y="100" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" opacity="0.95">EN-ROUTE</text>
  
  <!-- Tagline -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Smart Household</text>
  <text x="100" y="240" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Registration</text>
  
  <!-- Subtitle -->
  <text x="100" y="300" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.7">Helping every home in Ukhrul get found.</text>
  
  <!-- CTA -->
  <rect x="100" y="400" width="250" height="55" fill="url(#accent)" rx="12"/>
  <text x="225" y="435" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Register Now</text>
  
  <!-- Domain -->
  <text x="100" y="500" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.5">discoverukhrul.site</text>
  
  <!-- Decorative Dots -->
  <circle cx="1050" cy="150" r="3" fill="white" opacity="0.2"/>
  <circle cx="1080" cy="180" r="2" fill="white" opacity="0.15"/>
  <circle cx="1020" cy="200" r="4" fill="white" opacity="0.1"/>
  <circle cx="1100" cy="250" r="2" fill="white" opacity="0.2"/>
  <circle cx="1060" cy="300" r="3" fill="white" opacity="0.15"/>
</svg>
